name: Actualizar ONPE

on:

  workflow_dispatch:

  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:

  actualizar:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install chromium

      - run: node onpe.js

      - name: Commit JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add resultados.json

          git diff --cached --quiet || git commit -m "Actualizar resultados"

          git push
